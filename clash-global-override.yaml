# Clash / Mihomo global extend override
# Source: Shadowrocket config 2026-06-05

ipv6: false

hosts:
  localhost: 127.0.0.1

proxy-groups:
  - name: "PROXY"
    type: select
    include-all: true

  - name: "♻️ 自动选择"
    type: url-test
    include-all: true
    filter: "."
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🚀 手动切换"
    type: select
    include-all: true

  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🚀 手动切换"
      - "🇭🇰 香港节点"
      - "🇼🇸 台湾节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 狮城节点"
      - "🇺🇲 美国节点"
      - "🇬🇧 英国节点"
      - "🇲🇾 马来节点"
      - "🇺🇳 小众节点"
      - "DIRECT"
      - "PROXY"

  - name: "📲 电报消息"
    type: select
    proxies: &policy-proxies
      - "DIRECT"
      - "PROXY"
      - "♻️ 自动选择"
      - "🚀 手动切换"
      - "🚀 节点选择"
      - "🇭🇰 香港节点"
      - "🇼🇸 台湾节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 狮城节点"
      - "🇺🇲 美国节点"
      - "🇬🇧 英国节点"
      - "🇲🇾 马来节点"
      - "🇺🇳 小众节点"

  - name: "💬 AI"
    type: select
    proxies: *policy-proxies

  - name: "📹 油管视频"
    type: select
    proxies: *policy-proxies

  - name: "🎥 奈飞视频"
    type: select
    proxies: *policy-proxies

  - name: "📺 巴哈姆特"
    type: select
    proxies:
      - "DIRECT"
      - "PROXY"
      - "🇼🇸 台湾节点"
      - "🚀 节点选择"
      - "🚀 手动切换"

  - name: "📺 哔哩哔哩"
    type: select
    proxies:
      - "DIRECT"
      - "PROXY"
      - "🎯 全球直连"
      - "🇼🇸 台湾节点"
      - "🇭🇰 香港节点"

  - name: "🎶 网易音乐"
    type: select
    proxies:
      - "DIRECT"
      - "PROXY"
      - "🚀 节点选择"
      - "♻️ 自动选择"

  - name: "🎵 SPOTIFY"
    type: select
    proxies: *policy-proxies

  - name: "🌍 国外媒体"
    type: select
    proxies: *policy-proxies

  - name: "🌏 国内媒体"
    type: select
    proxies:
      - "DIRECT"
      - "PROXY"
      - "🇭🇰 香港节点"
      - "🇼🇸 台湾节点"

  - name: "📢 谷歌FCM"
    type: select
    proxies: *policy-proxies

  - name: "Ⓜ️ 微软云盘"
    type: select
    proxies: *policy-proxies

  - name: "Ⓜ️ 微软服务"
    type: select
    proxies: *policy-proxies

  - name: "🍎 苹果服务"
    type: select
    proxies: *policy-proxies

  - name: "🎮 游戏平台"
    type: select
    proxies: *policy-proxies

  - name: "🎯 全球直连"
    type: select
    proxies:
      - "DIRECT"
      - "PROXY"
      - "🚀 节点选择"
      - "♻️ 自动选择"

  - name: "🛑 广告拦截"
    type: select
    proxies:
      - "REJECT"
      - "DIRECT"

  - name: "🍃 应用净化"
    type: select
    proxies:
      - "REJECT"
      - "DIRECT"

  - name: "🐟 漏网之鱼"
    type: select
    proxies: *policy-proxies

  - name: "🇭🇰 香港节点"
    type: url-test
    include-all: true
    filter: "(🇭🇰)|(港)|(Hong)|(HK)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🇼🇸 台湾节点"
    type: url-test
    include-all: true
    filter: "(🇼🇸)|(台)|(Tai)|(TW)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🇯🇵 日本节点"
    type: url-test
    include-all: true
    filter: "(🇯🇵)|(日)|(Japan)|(JP)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🇸🇬 狮城节点"
    type: url-test
    include-all: true
    filter: "(🇸🇬)|(新)|(Singapore)|(SG)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🇺🇲 美国节点"
    type: url-test
    include-all: true
    filter: "(🇺🇸)|(🇺🇲)|(美)|(States)|(US)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🇬🇧 英国节点"
    type: url-test
    include-all: true
    filter: "(🇬🇧)|(英)|(Kingdom)|(UK)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🇲🇾 马来节点"
    type: url-test
    include-all: true
    filter: "(🇲🇾)|(马)|(Malaysia)|(MA)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🇺🇳 小众节点"
    type: url-test
    include-all: true
    filter: "(喀麦隆)|(冰岛)|(土耳其)|(阿根廷)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🗺️ Non-HK"
    type: url-test
    proxies:
      - "🇼🇸 台湾节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 狮城节点"
      - "🇺🇲 美国节点"
      - "🇬🇧 英国节点"
      - "🇲🇾 马来节点"
      - "🇺🇳 小众节点"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🌏 Asia"
    type: url-test
    proxies:
      - "🇭🇰 香港节点"
      - "🇼🇸 台湾节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 狮城节点"
      - "🇲🇾 马来节点"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

  - name: "🌎 Western"
    type: url-test
    proxies:
      - "PROXY"
      - "🇺🇲 美国节点"
      - "🇬🇧 英国节点"
      - "🇺🇳 小众节点"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 8000

